; ============================================================================
;  ESP32-WarSniffer node — PlatformIO project configuration
;  Target: ESP32-S3-DevKitC-1 (N16R8 = 16 MB flash, 8 MB octal PSRAM)
;  Headless passive monitor + WIDS. Sniffs 802.11 in promiscuous mode,
;  channel-hops, tallies frames, raises defensive detections, then
;  interleaves to associate with the C2 and POST a metadata snapshot.
;
;  Quick start:
;     pio run -t upload       # flash firmware (UART port)
;     pio device monitor      # serial console 115200
; ============================================================================
[platformio]
default_envs = esp32s3_warsniffer

[env:esp32s3_warsniffer]
platform  = espressif32@^6.7.0
board     = esp32-s3-devkitc-1
framework = arduino

; ---- N16R8: 16 MB QIO flash + 8 MB OPI PSRAM ------------------------------
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.partitions          = partitions.csv
board_build.filesystem          = littlefs

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
    ; HTTPClient, WiFi, esp_wifi (promiscuous) — espressif32 core
