; ============================================================================
;  ESP32-BlueDriver node — PlatformIO project configuration
;  Target: ESP32-S3-DevKitC-1 (N16R8 = 16 MB flash, 8 MB octal PSRAM)
;  Headless BLE-only scan-and-report node. Uses NimBLE-Arduino v2.x for
;  continuous BLE advertisement scanning (passive + active) and WiFi STA
;  to POST device inventory + status to the C2 /ingest endpoint.
;
;  NOTE: ESP32-S3 supports BLE 5.0 ONLY — no Bluetooth Classic (BR/EDR).
;  Only the original ESP32 (non-S/C) has Classic. This is a hardware limit.
;
;  WiFi + BLE coexist via the ESP32-S3's software coexistence arbiter
;  (time-division on the shared 2.4 GHz radio). NimBLE is pinned to core 0;
;  the main loop (WiFi + HTTP) runs on core 1. No manual interleaving needed.
;
;  Quick start:
;     pio run -t upload       # flash firmware (UART port)
;     pio device monitor      # serial console 115200
; ============================================================================
[platformio]
default_envs = esp32s3_bluedriver

[env:esp32s3_bluedriver]
platform  = espressif32@^6.7.0
board     = esp32-s3-devkitc-1
framework = arduino

; ---- N16R8: 16 MB QIO flash + 8 MB OPI PSRAM ------------------------------
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.partitions          = partitions.csv
board_build.filesystem          = littlefs

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; NimBLE host task pinned to core 0; WiFi/main runs on core 1.
    -DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
    ; Software coexistence: let the arbiter time-slice WiFi + BLE.
    -DCONFIG_ESP_WIFI_SW_COEXIST_ENABLE=1

lib_deps =
    h2zero/NimBLE-Arduino @ ^2.1.0
    bblanchon/ArduinoJson @ ^7.2.0
    ; HTTPClient, WiFi — espressif32 core
