; ============================================================================
;  ESP32-Net  —  Command & Control coordinator
;  Target board: ESP32-S2 (Flipper Zero "WiFi Dev Board" = ESP32-S2-WROVER)
;
;  This node hosts the SoftAP that the three S3 scan nodes join, ingests their
;  JSON over POST /ingest, and serves the unified terminal-style dashboard
;  (one tab per node) at http://192.168.4.1/
;
;  Quick start:
;     pio run -t upload        # flash firmware
;     pio device monitor       # serial console (115200)
;  Then join WiFi "ESP32-NET" (pw below) and browse to http://192.168.4.1/
; ============================================================================
[platformio]
default_envs = esp32s2_c2

[env:esp32s2_c2]
; The official Flipper WiFi Dev Board is an ESP32-S2-WROVER (4 MB flash, 2 MB
; PSRAM). esp32-s2-saola-1 is a safe generic S2 profile. If your module is a
; Wemos S2 Mini, change board to `lolin_s2_mini`.
platform  = espressif32@^6.7.0
board     = esp32-s2-saola-1
framework = arduino

board_build.partitions = partitions.csv
board_build.filesystem = littlefs

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=2
    ; AsyncTCP on the single-core S2 must run on core 0.
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    ; Serial console on the CP2102 UART port. If you use the native USB port,
    ; set this to 1 instead.
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    esp32async/AsyncTCP @ ^3.3.2
    esp32async/ESPAsyncWebServer @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.2.0
